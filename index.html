<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Product Viewer</title>

<script type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js">
</script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
background:#000;
color:#fff;
overflow:hidden;
}

/* LEFT SIDE MODEL */
.viewer-section{
flex:3;
display:flex;
justify-content:center;
align-items:center;
background:#000;
}

model-viewer{
width:90%;
height:90%;
background:#0a0a0a;
border-radius:20px;
box-shadow:0 0 40px #00f2ff55;
transition:all 0.4s ease;
}

/* RIGHT PANEL */
.product-panel{
flex:1;
background:#050505;
border-left:2px solid #00f2ff33;
padding:30px;
display:flex;
flex-direction:column;
gap:25px;
}

.panel-title{
font-size:22px;
color:#00f2ff;
margin-bottom:10px;
}

.color-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.color-btn{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
background:#111;
color:#00f2ff;
border:1px solid #00f2ff55;
transition:0.3s;
}

.color-btn:hover{
background:#00f2ff;
color:#000;
transform:scale(1.05);
box-shadow:0 0 15px #00f2ff;
}

.footer{
margin-top:auto;
font-size:13px;
color:#666;
}

</style>
</head>

<body>

<div class="viewer-section">
<model-viewer id="viewer"
src="/assets/Kitchen Stand.glb"
camera-controls
auto-rotate
shadow-intensity="1"
exposure="1">
</model-viewer>
</div>

<div class="product-panel">

<div>
<div class="panel-title">Wood Variants</div>

<div class="color-group">
<button class="color-btn" onclick="changeWoodColor('#8B4513')">Classic Wood</button>
<button class="color-btn" onclick="changeWoodColor('#5C4033')">Dark Wood</button>
<button class="color-btn" onclick="changeWoodColor('#D2B48C')">Light Wood</button>
<button class="color-btn" onclick="changeWoodColor('#111111')">Matte Black</button>
</div>

</div>

<div class="footer">
Same Design • Color Variant Only
</div>

</div>

<script>
const viewer = document.getElementById("viewer");
let woodMaterial = null;

/* Get Wood Material After Model Load */
viewer.addEventListener("load", () => {

  const materials = viewer.model.materials;

  materials.forEach((mat)=>{
    console.log("Material Name:", mat.name); // check console once

    if(mat.name.toLowerCase().includes("wood")){
      woodMaterial = mat;
    }
  });

});

/* Change Only Wood Color */
function changeWoodColor(color){

  if(!woodMaterial) return;

  woodMaterial.pbrMetallicRoughness.setBaseColorFactor([
    ...hexToRgb(color), 1
  ]);
}

/* Convert HEX to RGB */
function hexToRgb(hex){
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  return [r,g,b];
}
</script>

</body>
</html>
